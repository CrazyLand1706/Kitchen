<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квест на навчання</title>
    <style>
        body {
            background-image: url('https://files.catbox.moe/cu1kd2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            margin-top: 50px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }
        input[type="password"] {
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
        }
        iframe {
            width: 100%;
            height: 450px;
            border: none;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="content">
    <h1>Для отримання завдання введіть вашу правильну відповідь</h1>
    <input type="password" id="password" placeholder="Пароль">
    <button onclick="checkPassword()">Відкрити відео</button>
    <iframe id="video" src="https://www.youtube.com/embed/LuzXr3He9NI?autohide=1&showinfo=0&controls=0&modestbranding=1" allowfullscreen></iframe>
</div>

<script>
    function checkPassword() {
        var enteredPassword = document.getElementById('password').value;
        if (enteredPassword === '1234') {
            document.getElementById('video').style.display = 'block';
        } else {
            alert('Невірний пароль. Спробуйте ще раз!');
        }
    }
</script>

</body>
</html>
